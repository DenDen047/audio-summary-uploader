services:
  automator:
    build: .
    # image: ghcr.io/ikuta/audio-summary-uploader:latest  # GHCR公開後はこちらを使用
    container_name: audio-summary-uploader
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./config:/app/config
      - ./credentials:/app/credentials
      - ./tmp:/app/tmp
      - ./data:/app/data
      - ~/.notebooklm:/home/appuser/.notebooklm:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
